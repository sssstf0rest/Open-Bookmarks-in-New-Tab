<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bookmark redirect</title>
</head>
<body>
  <script>
    // This page is used as a proxy for bookmarks on domains where Chrome
    // strips the newtab@ userinfo (e.g. Google, Microsoft).
    //
    // Normal flow (extension installed & enabled):
    //   The declarativeNetRequest rule intercepts this URL before it loads
    //   and redirects to empty.zip — this page never actually renders.
    //
    // Fallback flow (extension disabled or uninstalled):
    //   This page loads and redirects the user to the original bookmark URL
    //   extracted from the ?url= query parameter.

    const redirectUrl = new URL(location.href).searchParams.get('url');

    if (redirectUrl) {
      // Redirect to the original bookmark URL
      location.replace(redirectUrl);
    } else {
      // No URL parameter — show a helpful message
      document.body.innerHTML =
        '<p style="font-family:system-ui;color:#888;text-align:center;margin-top:40vh">' +
        'This page is used by the <strong>Open Bookmarks in New Tab</strong> extension.' +
        '</p>';
    }
  </script>
</body>
</html>
